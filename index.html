<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短影音腳本審核系統｜大興・骨立・華榮 聯合醫療</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --teal: #1a7a6e;
  --teal-2: #2d9e8f;
  --teal-3: #e8f4f2;
  --teal-4: #b2ddd8;
  --teal-dark: #0f5248;
  --ink: #1a1e1e;
  --ink-2: #3a4040;
  --ink-3: #6a7070;
  --border: #e0ddd8;
  --border-2: #f0ede8;
  --bg: #f6f5f2;
  --white: #ffffff;
  --gold: #b8962e;
  --gold-2: #fdf8ee;
  --ok: #1e7a4a;
  --ok-2: #edf7f2;
  --ok-3: #a8d8bc;
  --warn: #9a6010;
  --warn-2: #fdf6e8;
  --warn-3: #e8c070;
  --err: #9a2810;
  --err-2: #fdf0ec;
  --err-3: #e8a890;
  --front-color: #7a4810;
  --front-bg: #fdf8f2;
  --front-border: #e8c898;
  --mid-color: #1a4a7a;
  --mid-bg: #f2f6fd;
  --mid-border: #98b8e0;
  --end-color: #1a6a3a;
  --end-bg: #f2fdf6;
  --end-border: #98d8b0;
  --comment-bg: #fffbf0;
  --comment-border: #e8d898;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.6;
}

/* ─── HOMEPAGE ─── */
.homepage {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.home-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 32px 48px;
}
.home-header-inner {
  max-width: 960px;
  margin: 0 auto;
}
.home-brand {
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--teal-2);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.home-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 6px;
}
.home-subtitle {
  font-size: 14px;
  color: var(--ink-3);
}
.home-meta {
  display: flex;
  gap: 24px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border-2);
}
.home-meta-item {
  font-size: 12px;
  color: var(--ink-3);
  display: flex;
  align-items: center;
  gap: 6px;
}
.home-meta-item strong { color: var(--ink-2); font-weight: 600; }

.home-body {
  flex: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 48px;
  width: 100%;
}

.home-section-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 20px;
}

.doctor-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.doctor-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.doctor-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--teal);
  transform: scaleX(0);
  transition: transform 0.2s;
  transform-origin: left;
}
.doctor-card:hover { border-color: var(--teal-4); box-shadow: 0 4px 20px rgba(26,122,110,0.08); }
.doctor-card:hover::before { transform: scaleX(1); }

.doctor-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--teal-3);
  border: 2px solid var(--teal-4);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--teal-dark);
  margin-bottom: 14px;
}
.doctor-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.doctor-clinic {
  font-size: 12px;
  color: var(--teal-2);
  font-weight: 500;
  margin-bottom: 12px;
}
.doctor-scripts-count {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 16px;
}
.doctor-script-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.doctor-script-tag {
  font-size: 11px;
  padding: 3px 8px;
  background: var(--teal-3);
  border: 1px solid var(--teal-4);
  color: var(--teal-dark);
  border-radius: 4px;
}
.doctor-enter-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border-2);
  font-size: 12px;
  font-weight: 600;
  color: var(--teal);
}

.home-notice {
  margin-top: 32px;
  background: var(--gold-2);
  border: 1px solid var(--warn-3);
  border-left: 3px solid var(--gold);
  border-radius: 6px;
  padding: 14px 18px;
  font-size: 12px;
  color: var(--warn);
  line-height: 1.7;
}

/* ─── REVIEW PAGE ─── */
.review-page { display: none; min-height: 100vh; flex-direction: column; }

/* TOP BAR */
.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.back-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--ink-3); cursor: pointer;
  padding: 6px 10px; border-radius: 5px;
  transition: all 0.15s;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
}
.back-btn:hover { background: var(--bg); color: var(--ink); }
.topbar-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  white-space: nowrap;
}
.topbar-doctor {
  font-size: 11px;
  color: var(--teal-2);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}
.topbar-right { display: flex; align-items: center; gap: 20px; }
.progress-wrap {
  display: flex; align-items: center; gap: 10px;
  font-size: 11px; color: var(--ink-3);
}
.progress-bar {
  width: 120px; height: 4px;
  background: var(--border);
  border-radius: 2px;
}
.progress-fill {
  height: 100%;
  background: var(--teal);
  border-radius: 2px;
  transition: width 0.4s;
}

/* LAYOUT */
.review-layout { display: flex; flex: 1; }

/* SIDEBAR */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  position: sticky;
  top: 52px;
  height: calc(100vh - 52px);
  overflow-y: auto;
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 16px 0;
}
.sidebar-section { padding: 0 14px 8px; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-3); }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  text-decoration: none;
  color: var(--ink-3);
}
.nav-item:hover { background: var(--teal-3); color: var(--teal); }
.nav-item.active { border-left-color: var(--teal); background: var(--teal-3); color: var(--teal); font-weight: 600; }
.nav-ep { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; color: var(--teal-2); background: var(--teal-3); padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
.nav-label { font-size: 11px; line-height: 1.35; flex: 1; }
.nav-status { font-size: 12px; flex-shrink: 0; }

/* MAIN */
.main-content { flex: 1; padding: 28px 36px; min-width: 0; }

/* SUMMARY BAR */
.summary-bar {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.summary-stats { display: flex; gap: 24px; }
.stat-item { text-align: center; }
.stat-num { font-size: 22px; font-weight: 700; font-family: 'Noto Serif TC', serif; line-height: 1; }
.stat-label { font-size: 10px; color: var(--ink-3); margin-top: 2px; letter-spacing: 0.05em; }
.stat-ok .stat-num { color: var(--ok); }
.stat-warn .stat-num { color: var(--warn); }
.stat-err .stat-num { color: var(--err); }
.stat-divider { width: 1px; background: var(--border); }

/* SCRIPT CARD */
.script-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 24px;
  overflow: hidden;
  scroll-margin-top: 68px;
}

/* CARD HEADER */
.card-head {
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.card-head-left {}
.card-ep-badge {
  display: inline-block;
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  color: var(--teal-2); background: var(--teal-3);
  border: 1px solid var(--teal-4);
  padding: 2px 8px; border-radius: 4px;
  margin-bottom: 6px;
}
.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px; font-weight: 700;
  color: var(--ink); line-height: 1.4;
  margin-bottom: 10px;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.card-tag {
  font-size: 11px; padding: 2px 8px;
  border: 1px solid var(--border);
  color: var(--ink-2); border-radius: 20px;
  background: var(--bg);
}
.card-verdict {
  flex-shrink: 0;
  font-size: 11px; font-weight: 700;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--ink-3); background: var(--bg);
  white-space: nowrap; align-self: flex-start;
  transition: all 0.2s;
}
.card-verdict.pass { background: var(--ok-2); border-color: var(--ok-3); color: var(--ok); }
.card-verdict.revise { background: var(--warn-2); border-color: var(--warn-3); color: var(--warn); }
.card-verdict.reject { background: var(--err-2); border-color: var(--err-3); color: var(--err); }

/* SCRIPT TABLE */
.script-section-wrap { border-bottom: 1px solid var(--border-2); }

.section-header {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border-2);
  cursor: pointer;
  user-select: none;
}
.section-pip {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.front-pip { background: var(--front-color); }
.mid-pip { background: var(--mid-color); }
.end-pip { background: var(--end-color); }

.section-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
}
.front-title { color: var(--front-color); }
.mid-title { color: var(--mid-color); }
.end-title { color: var(--end-color); }

.section-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-3);
  background: var(--bg); padding: 2px 8px;
  border-radius: 4px; border: 1px solid var(--border);
}
.section-comment-count {
  margin-left: auto;
  font-size: 10px; color: var(--ink-3);
}

/* BREAKDOWN TABLE */
.breakdown-table {
  width: 100%;
  border-collapse: collapse;
}
.breakdown-table thead tr {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.breakdown-table th {
  padding: 8px 12px;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); text-align: left;
}
.th-timecode { width: 64px; }
.th-visual { width: 140px; }
.th-line { }
.th-sec { width: 48px; text-align: right; }
.th-comment { width: 36px; }

.breakdown-table tbody tr {
  border-bottom: 1px solid var(--border-2);
  transition: background 0.1s;
}
.breakdown-table tbody tr:last-child { border-bottom: none; }
.breakdown-table tbody tr:hover { background: #fafaf8; }
.breakdown-table tbody tr.section-divider td {
  padding: 6px 12px;
  background: var(--bg);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-3);
  border-bottom: 1px solid var(--border);
}

.td-timecode {
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--teal-2);
  font-weight: 500; white-space: nowrap;
  vertical-align: top;
}
.td-visual {
  padding: 10px 12px;
  font-size: 11px; color: var(--ink-3);
  vertical-align: top;
}
.visual-tag {
  display: inline-block;
  font-size: 10px; padding: 1px 6px;
  border-radius: 3px; border: 1px solid;
}
.vtag-doctor { background: var(--teal-3); border-color: var(--teal-4); color: var(--teal-dark); }
.vtag-hidden { background: #f0f0f0; border-color: #d0d0d0; color: #555; }
.vtag-pause { background: #f8f8f0; border-color: #e0e0a0; color: #666; }
.vtag-card { background: var(--gold-2); border-color: var(--warn-3); color: var(--warn); }
.vtag-note { background: var(--teal-3); border-color: var(--teal-4); color: var(--teal-dark); font-style: italic; }

.td-line {
  padding: 10px 12px;
  font-size: 13px; color: var(--ink-2);
  line-height: 1.6; vertical-align: top;
}
.line-hidden { color: var(--ink-3); font-style: italic; }
.line-note { color: var(--teal-2); font-size: 12px; }
.td-sec {
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-3);
  text-align: right; vertical-align: top; white-space: nowrap;
}
.td-comment-btn {
  padding: 10px 8px;
  vertical-align: top; text-align: center;
}
.comment-trigger {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--ink-3);
  cursor: pointer;
  font-size: 11px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.comment-trigger:hover { border-color: var(--teal-4); background: var(--teal-3); color: var(--teal); }
.comment-trigger.has-comment { background: var(--comment-bg); border-color: var(--comment-border); color: var(--gold); }

/* INLINE COMMENT */
.inline-comment-row { display: none; }
.inline-comment-row.open { display: table-row; }
.inline-comment-cell {
  padding: 0 12px 12px 60px;
  background: var(--comment-bg);
  border-bottom: 1px solid var(--comment-border);
}
.inline-comment-inner {
  border: 1px solid var(--comment-border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--white);
}
.inline-comment-label {
  padding: 6px 10px;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--warn); background: var(--warn-2);
  border-bottom: 1px solid var(--comment-border);
}
.inline-comment-field {
  width: 100%; border: none;
  padding: 8px 10px;
  font-size: 12px; font-family: 'Noto Sans TC', sans-serif;
  color: var(--ink); background: var(--white);
  resize: none; outline: none; min-height: 56px;
}

/* SECTION COMMENT */
.section-comment-area {
  padding: 14px 24px;
  background: var(--comment-bg);
  border-top: 1px dashed var(--comment-border);
}
.section-comment-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--warn); margin-bottom: 6px;
}
.section-comment-field {
  width: 100%; border: 1px solid var(--comment-border);
  border-radius: 6px; padding: 8px 12px;
  font-size: 12px; font-family: 'Noto Sans TC', sans-serif;
  color: var(--ink); background: var(--white);
  resize: none; outline: none; min-height: 56px;
  transition: border-color 0.15s;
}
.section-comment-field:focus { border-color: var(--gold); }

/* END CARD */
.end-card-section {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--teal-3);
}
.end-card-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--teal-2); margin-bottom: 8px;
}
.end-card-content {
  font-family: 'Noto Serif TC', serif;
  font-size: 13px; color: var(--teal-dark);
  font-weight: 500; line-height: 1.7;
  white-space: pre-line;
}

/* COMPLIANCE */
.compliance-section {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
}
.compliance-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 10px;
}
.compliance-list { display: flex; flex-direction: column; gap: 4px; }
.compliance-item {
  display: flex; align-items: baseline; gap: 8px;
  font-size: 12px; padding: 5px 0;
  border-bottom: 1px solid var(--border-2);
}
.compliance-item:last-child { border-bottom: none; }
.compliance-icon { font-size: 13px; flex-shrink: 0; }
.compliance-text { color: var(--ink-2); flex: 1; }
.compliance-note { color: var(--ink-3); font-size: 11px; }

/* VERDICT */
.verdict-section {
  padding: 20px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.verdict-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-3); margin-bottom: 14px;
}
.verdict-choices { display: flex; gap: 10px; margin-bottom: 14px; }
.verdict-choice {
  flex: 1; padding: 12px 16px;
  border: 1.5px solid var(--border);
  border-radius: 7px; background: var(--white);
  cursor: pointer; transition: all 0.15s;
  text-align: center;
}
.verdict-choice:hover { border-color: var(--teal-4); }
.verdict-choice.sel-pass { border-color: var(--ok-3); background: var(--ok-2); }
.verdict-choice.sel-revise { border-color: var(--warn-3); background: var(--warn-2); }
.verdict-choice.sel-reject { border-color: var(--err-3); background: var(--err-2); }
.verdict-choice-icon { font-size: 18px; margin-bottom: 4px; }
.verdict-choice-label { font-size: 12px; font-weight: 700; }
.sel-pass .verdict-choice-label { color: var(--ok); }
.sel-revise .verdict-choice-label { color: var(--warn); }
.sel-reject .verdict-choice-label { color: var(--err); }
.verdict-choice-sub { font-size: 10px; color: var(--ink-3); margin-top: 2px; }

.verdict-submit {
  display: flex; align-items: center; gap: 12px;
}
.submit-btn {
  padding: 9px 22px;
  background: var(--teal); color: var(--white);
  border: none; border-radius: 6px;
  font-size: 13px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer; transition: background 0.15s;
}
.submit-btn:hover { background: var(--teal-dark); }
.submit-btn:disabled { background: #bbb; cursor: default; }
.submit-confirm {
  display: none; align-items: center; gap: 8px;
  font-size: 12px; font-weight: 600;
  padding: 8px 14px; border-radius: 6px;
}
.submit-confirm.pass { background: var(--ok-2); color: var(--ok); border: 1px solid var(--ok-3); }
.submit-confirm.revise { background: var(--warn-2); color: var(--warn); border: 1px solid var(--warn-3); }
.submit-confirm.reject { background: var(--err-2); color: var(--err); border: 1px solid var(--err-3); }

/* FLOATING REPORT BUTTON */
.float-report-btn {
  position: fixed;
  bottom: 24px;
  right: 20px;
  z-index: 500;
  display: none;
  align-items: center;
  gap: 7px;
  padding: 13px 20px;
  background: var(--teal);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-size: 14px; font-weight: 700;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(26,122,110,0.35);
  transition: all 0.2s;
}
.float-report-btn:hover { background: var(--teal-dark); transform: translateY(-2px); }
.float-report-btn.visible { display: flex; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }

// ─── STATE ───
const reviewState = {};
allScripts.forEach(s => {
  reviewState[s.id] = { verdict: null, lineComments: {}, sectionComments: { front:'', mid:'', end:'' } };
});

let currentDoctor = null;
let currentScripts = [];

// ─── VISUAL TAG ───
function visualTag(type) {
  const map = {
    doctor: { cls:'vtag-doctor', label:'醫師' },
    hidden: { cls:'vtag-hidden', label:'藏鏡人' },
    pause:  { cls:'vtag-pause',  label:'停頓' },
    card:   { cls:'vtag-card',   label:'字卡' },
    note:   { cls:'vtag-note',   label:'補充說明' }
  };
  const v = map[type] || { cls:'vtag-doctor', label:type };
  return `<span class="visual-tag ${v.cls}">${v.label}</span>`;
}

// ─── HOMEPAGE ───
function buildHomepage() {
  const grid = document.getElementById('doctor-grid');
  doctors.forEach(d => {
    const card = document.createElement('div');
    card.className = 'doctor-card';
    card.onclick = () => enterDoctor(d.id);
    card.innerHTML = `
      <div class="doctor-name">${d.name}</div>
      <div class="doctor-clinic">${d.clinicFull}</div>
      <div class="doctor-scripts-count">需審核 ${d.scripts.length} 支腳本</div>
      <div class="doctor-script-tags">
        ${d.scripts.map((ep,i) => `<span class="doctor-script-tag">${ep} ${d.scriptTitles[i]}</span>`).join('')}
      </div>
      <div class="doctor-enter-btn">
        <span>進入審核</span>
        <span>→</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function enterDoctor(docId) {
  document.getElementById('float-report-btn').classList.add('visible');
  currentDoctor = doctors.find(d => d.id === docId);
  currentScripts = allScripts.filter(s => currentDoctor.scripts.includes(s.id));
  document.getElementById('homepage').style.display = 'none';
  const rp = document.getElementById('review-page');
  rp.style.display = 'flex';
  document.getElementById('topbar-title').textContent = '腳本審核';
  document.getElementById('topbar-doctor').textContent = `${currentDoctor.name}・${currentDoctor.clinicFull}`;
  document.getElementById('summary-doctor-name') && (document.getElementById('summary-doctor-name').textContent = currentDoctor.name);
  buildReviewPage();
  updateProgress();
}

function goHome() {
  document.getElementById('float-report-btn').classList.remove('visible');
  document.getElementById('review-page').style.display = 'none';
  document.getElementById('homepage').style.display = 'flex';
  document.getElementById('nav-list').innerHTML = '';
  document.getElementById('scripts-container').innerHTML = '';
}

// ─── REVIEW PAGE ───
function buildReviewPage() {
  buildSidebar();
  buildScripts();
}

function buildSidebar() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  currentScripts.forEach(s => {
    const a = document.createElement('a');
    a.href = `#script-${s.id}`;
    a.className = 'nav-item';
    a.id = `nav-${s.id}`;
    a.innerHTML = `
      <span class="nav-ep">${s.id}</span>
      <span class="nav-label">${s.title}</span>
      <span class="nav-status" id="navs-${s.id}"></span>
    `;
    nav.appendChild(a);
  });
}

function buildScripts() {
  const container = document.getElementById('scripts-container');
  container.innerHTML = '';
  currentScripts.forEach(s => {
    const card = document.createElement('div');
    card.className = 'script-card';
    card.id = `script-${s.id}`;

    const complianceHtml = s.compliance.map(c => `
      <div class="compliance-item">
        <span class="compliance-icon">${c.status === 'ok' ? '✅' : '⚠️'}</span>
        <span class="compliance-text">${c.text}</span>
        <span class="compliance-note">${c.note}</span>
      </div>
    `).join('');

    const sectionsHtml = s.sections.map(sec => buildSection(s.id, sec)).join('');

    card.innerHTML = `
      <div class="card-head">
        <div class="card-head-left">
          <div class="card-ep-badge">${s.id}</div>
          <div class="card-title">${s.title}</div>

            <span class="card-tag">👨‍⚕️ ${s.doctor}</span>

        <div class="card-verdict" id="verdict-badge-${s.id}">待審核</div>

      ${sectionsHtml}

            <div class="verdict-choice-sub">確認無誤，可拍攝</div>
          </div>
          <div class="verdict-choice" id="vc-${s.id}-revise" onclick="selectVerdict('${s.id}','revise')">
            <div class="verdict-choice-icon">⚠️</div>
            <div class="verdict-choice-label">REVISE</div>
            <div class="verdict-choice-sub">部分需修改</div>
          </div>
          <div class="verdict-choice" id="vc-${s.id}-reject" onclick="selectVerdict('${s.id}','reject')">
            <div class="verdict-choice-icon">❌</div>
            <div class="verdict-choice-label">REJECT</div>
            <div class="verdict-choice-sub">需要重寫</div>
          </div>
        </div>
        <div class="verdict-submit">
          <button class="submit-btn" id="submit-${s.id}" onclick="submitVerdict('${s.id}')" disabled>提交審核</button>
          <div class="submit-confirm" id="confirm-${s.id}"><span></span></div>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  // Intersection observer
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('script-','');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const nav = document.getElementById(`nav-${id}`);
        if (nav) nav.classList.add('active');
      }
    });
  }, { threshold: 0.15 });
  currentScripts.forEach(s => {
    const el = document.getElementById(`script-${s.id}`);
    if (el) obs.observe(el);
  });
}

function buildSection(scriptId, sec) {
  const typeMap = { front:'前段', mid:'中段', end:'後段' };
  const pipClass = { front:'front-pip', mid:'mid-pip', end:'end-pip' }[sec.type];
  const titleClass = { front:'front-title', mid:'mid-title', end:'end-title' }[sec.type];

  const rowsHtml = sec.rows.map((row, ri) => {
    const rowId = `${scriptId}-${sec.type}-${ri}`;
    const lineClass = row.visual === 'hidden' ? 'line-hidden' : row.visual === 'note' ? 'line-note' : '';
    return `
      <tr>
        <td class="td-timecode">${row.tc}</td>
        <td class="td-visual">${visualTag(row.visual)}</td>
        <td class="td-line"><span class="${lineClass}">${row.line}</span></td>
        <td class="td-sec">${row.sec}</td>
        <td class="td-comment-btn">
          <button class="comment-trigger" id="ctrigger-${rowId}" onclick="toggleLineComment('${rowId}')" title="新增批注">💬</button>
        </td>
      </tr>
      <tr class="inline-comment-row" id="icomment-${rowId}">
        <td colspan="5" class="inline-comment-cell">
          <div class="inline-comment-inner">
            <div class="inline-comment-label">批注</div>
            <textarea class="inline-comment-field" placeholder="請輸入此行的修改意見..." rows="2"
              onchange="saveLineComment('${scriptId}','${sec.type}','${ri}',this.value)"
              oninput="saveLineComment('${scriptId}','${sec.type}','${ri}',this.value)"></textarea>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  // Mobile card HTML
  const cardsHtml = sec.rows.map((row, ri) => {
    const rowId = `${scriptId}-${sec.type}-${ri}`;
    const lineClass = row.visual === 'hidden' ? 'line-hidden' : row.visual === 'note' ? 'line-note' : '';
    return `
      <div class="row-card">
        <div class="row-card-meta">
          <span class="row-card-tc">${row.tc}</span>
          ${visualTag(row.visual)}
          <span class="row-card-sec">${row.sec}</span>
        </div>
        <div class="row-card-line ${lineClass}">${row.line}</div>
        <button class="row-card-comment-btn" id="mctrigger-${rowId}" onclick="toggleMobileComment('${rowId}')">💬 批注此行</button>
        <div class="row-card-comment-area" id="mcomment-${rowId}">
          <div class="row-card-comment-inner">
            <div class="row-card-comment-label">批注</div>
            <textarea class="row-card-comment-field" placeholder="請輸入此行的修改意見..."
              oninput="saveMobileComment('${scriptId}','${sec.type}','${ri}',this.value)"></textarea>
          </div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="script-section-wrap">
      <div class="section-header">
        <span class="section-pip ${pipClass}"></span>
        <span class="section-title ${titleClass}">${typeMap[sec.type]}</span>
        <span class="section-time">${sec.timeRange}</span>
        <span class="section-comment-count" id="sec-count-${scriptId}-${sec.type}"></span>
      </div>
      <table class="breakdown-table">
        <thead>
          <tr>
            <th class="th-timecode">時間碼</th>
            <th class="th-visual">畫面</th>
            <th class="th-line">台詞</th>
            <th class="th-sec">秒數</th>
            <th class="th-comment"></th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="script-row-card">${cardsHtml}</div>
      <div class="section-comment-area">
        <div class="section-comment-label">${typeMap[sec.type]} 整體意見</div>
        <textarea class="section-comment-field" placeholder="對此段落的整體修改建議..." rows="2"
          onchange="saveSectionComment('${scriptId}','${sec.type}',this.value)"
          oninput="saveSectionComment('${scriptId}','${sec.type}',this.value)"></textarea>
      </div>
    </div>
  `;
}

function toggleMobileComment(rowId) {
  const area = document.getElementById(`mcomment-${rowId}`);
  const btn = document.getElementById(`mctrigger-${rowId}`);
  const isOpen = area.classList.contains('open');
  area.classList.toggle('open');
  if (!isOpen) area.querySelector('textarea').focus();
}

function saveMobileComment(scriptId, secType, rowIdx, val) {
  const key = `${secType}-${rowIdx}`;
  reviewState[scriptId].lineComments[key] = val;
  const rowId = `${scriptId}-${secType}-${rowIdx}`;
  const btn = document.getElementById(`mctrigger-${rowId}`);
  if (btn) btn.classList.toggle('has-comment', val.trim().length > 0);
  // also sync desktop trigger if exists
  const dBtn = document.getElementById(`ctrigger-${rowId}`);
  if (dBtn) dBtn.classList.toggle('has-comment', val.trim().length > 0);
  updateSectionCount(scriptId, secType);
}

function toggleLineComment(rowId) {
  const row = document.getElementById(`icomment-${rowId}`);
  const btn = document.getElementById(`ctrigger-${rowId}`);
  const isOpen = row.classList.contains('open');
  row.classList.toggle('open');
  if (!isOpen) { row.querySelector('textarea').focus(); }
}

function saveLineComment(scriptId, secType, rowIdx, val) {
  const key = `${secType}-${rowIdx}`;
  reviewState[scriptId].lineComments[key] = val;
  const rowId = `${scriptId}-${secType}-${rowIdx}`;
  const btn = document.getElementById(`ctrigger-${rowId}`);
  if (btn) btn.classList.toggle('has-comment', val.trim().length > 0);
  updateSectionCount(scriptId, secType);
}

function saveSectionComment(scriptId, secType, val) {
  reviewState[scriptId].sectionComments[secType] = val;
}

function updateSectionCount(scriptId, secType) {
  const keys = Object.keys(reviewState[scriptId].lineComments).filter(k => k.startsWith(secType) && reviewState[scriptId].lineComments[k].trim());
  const el = document.getElementById(`sec-count-${scriptId}-${secType}`);
  if (el) el.textContent = keys.length > 0 ? `${keys.length} 則批注` : '';
}

function selectVerdict(scriptId, verdict) {
  reviewState[scriptId].verdict = verdict;
  ['pass','revise','reject'].forEach(v => {
    const el = document.getElementById(`vc-${scriptId}-${v}`);
    el.className = 'verdict-choice' + (v === verdict ? ` sel-${v}` : '');
  });
  document.getElementById(`submit-${scriptId}`).disabled = false;
  document.getElementById(`confirm-${scriptId}`).style.display = 'none';
}

function submitVerdict(scriptId) {
  const v = reviewState[scriptId].verdict;
  if (!v) return;
  const labels = { pass:'✅ PASS — 確認無誤', revise:'⚠️ REVISE — 需要修改', reject:'❌ REJECT — 需要重寫' };
  const badge = document.getElementById(`verdict-badge-${scriptId}`);
  badge.textContent = labels[v].split(' — ')[0].replace(/[✅⚠️❌]\s/,'').trim();
  badge.className = `card-verdict ${v}`;
  const confirm = document.getElementById(`confirm-${scriptId}`);
  confirm.className = `submit-confirm ${v}`;
  confirm.style.display = 'flex';
  confirm.querySelector('span').textContent = labels[v];
  document.getElementById(`submit-${scriptId}`).disabled = true;
  const ns = document.getElementById(`navs-${scriptId}`);
  if (ns) ns.textContent = v === 'pass' ? '✅' : v === 'revise' ? '⚠️' : '❌';
  updateProgress();
  const idx = currentScripts.findIndex(s => s.id === scriptId);
  if (idx < currentScripts.length - 1) {
    setTimeout(() => {
      document.getElementById(`script-${currentScripts[idx+1].id}`).scrollIntoView({behavior:'smooth',block:'start'});
    }, 500);
  }
}

function generateReport() {
  const lines = [];
  lines.push('═══════════════════════════');
  lines.push('腳本審核回饋報告');
  lines.push(`醫師：${currentDoctor.name}`);
  lines.push(`診所：${currentDoctor.clinicFull}`);
  lines.push(`日期：${new Date().toLocaleDateString('zh-TW')}`);
  lines.push('═══════════════════════════');
  lines.push('');

  currentScripts.forEach(s => {
    const st = reviewState[s.id];
    const verdictLabel = st.verdict
      ? { pass:'✅ PASS', revise:'⚠️ REVISE', reject:'❌ REJECT' }[st.verdict]
      : '⏳ 待審核';

    lines.push(`【${s.id}】${s.title}`);
    lines.push(`審核結果：${verdictLabel}`);

    // Section comments
    const secLabels = { front:'前段', mid:'中段', end:'後段' };
    Object.entries(st.sectionComments).forEach(([sec, comment]) => {
      if (comment.trim()) {
        lines.push(`${secLabels[sec]}意見：${comment.trim()}`);
      }
    });

    // Line comments
    const lineKeys = Object.keys(st.lineComments).filter(k => st.lineComments[k].trim());
    if (lineKeys.length > 0) {
      lines.push('逐行批注：');
      lineKeys.forEach(key => {
        const [secType, rowIdx] = key.split('-');
        const sec = currentScripts.find(sc => sc.id === s.id);
        const section = sec ? sec.sections.find(se => se.type === secType) : null;
        if (section && section.rows[parseInt(rowIdx)]) {
          const rowLine = section.rows[parseInt(rowIdx)].line;
          const short = rowLine.length > 22 ? rowLine.substring(0, 22) + '...' : rowLine;
          lines.push(`  ・「${short}」`);
          lines.push(`    → ${st.lineComments[key].trim()}`);
        }
      });
    }
    lines.push('───────────────────────────');
    lines.push('');
  });

  // Stats
  const pass = currentScripts.filter(s => reviewState[s.id].verdict === 'pass').length;
  const revise = currentScripts.filter(s => reviewState[s.id].verdict === 'revise').length;
  const reject = currentScripts.filter(s => reviewState[s.id].verdict === 'reject').length;
  const pending = currentScripts.filter(s => !reviewState[s.id].verdict).length;
  lines.push(`總計：PASS ${pass} 支｜REVISE ${revise} 支｜REJECT ${reject} 支｜待審 ${pending} 支`);
  lines.push('═══════════════════════════');

  const reportText = lines.join('\n');
  document.getElementById('report-text').value = reportText;
  document.getElementById('report-modal').style.display = 'flex';
  document.getElementById('float-report-btn').style.display = 'none';
}

function closeReport() {
  document.getElementById('report-modal').style.display = 'none';
  document.getElementById('float-report-btn').style.display = '';
}

function copyReport() {
  const text = document.getElementById('report-text').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-report-btn');
    btn.textContent = '✅ 已複製';
    btn.style.background = '#1e7a4a';
    setTimeout(() => {
      btn.textContent = '📋 複製回饋';
      btn.style.background = '';
    }, 2000);
  });
}

function updateProgress() {
  const pass = currentScripts.filter(s => reviewState[s.id].verdict === 'pass').length;
  const revise = currentScripts.filter(s => reviewState[s.id].verdict === 'revise').length;
  const reject = currentScripts.filter(s => reviewState[s.id].verdict === 'reject').length;
  const done = pass + revise + reject;
  document.getElementById('stat-pass').textContent = pass;
  document.getElementById('stat-revise').textContent = revise;
  document.getElementById('stat-reject').textContent = reject;
  document.getElementById('progress-text').textContent = `已完成 ${done} / ${currentScripts.length}`;
  document.getElementById('progress-fill').style.width = `${(done/currentScripts.length)*100}%`;
}

buildHomepage();
</script>
<!-- FLOATING REPORT BUTTON -->
<button class="float-report-btn" id="float-report-btn" onclick="generateReport()">
  📤 產生回饋報告
</button>

<!-- REPORT MODAL -->
<div id="report-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:1000;flex-direction:column;">
  <div style="padding:14px 16px;border-bottom:1px solid #e0ddd8;display:flex;align-items:center;justify-content:space-between;background:#fff;flex-shrink:0;">
    <div>
      <div style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#6a7070;margin-bottom:2px;">REVIEW REPORT</div>
      <div style="font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:#1a1e1e;">審核回饋報告</div>
    </div>
    <button onclick="closeReport()" style="width:34px;height:34px;border-radius:50%;border:1px solid #e0ddd8;background:#f6f5f2;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>
  </div>
  <div style="padding:10px 16px;background:#f0faf8;border-bottom:1px solid #b2ddd8;flex-shrink:0;">
    <div style="font-size:13px;color:#1a7a6e;font-weight:500;">📤 複製後傳給靖宜</div>
  </div>
  <textarea id="report-text" readonly style="flex:1;padding:16px;font-size:14px;font-family:monospace;line-height:1.9;border:none;outline:none;resize:none;color:#1a1e1e;background:#fafaf8;overflow-y:auto;-webkit-overflow-scrolling:touch;"></textarea>
  <div style="padding:14px 16px;border-top:1px solid #e0ddd8;display:flex;gap:10px;background:#fff;flex-shrink:0;safe-area-inset-bottom:env(safe-area-inset-bottom);">
    <button onclick="closeReport()" style="flex:1;padding:12px;border:1px solid #e0ddd8;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;color:#6a7070;font-weight:600;">關閉</button>
    <button id="copy-report-btn" onclick="copyReport()" style="flex:2;padding:12px;background:#1a7a6e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background 0.15s;">📋 複製回饋</button>
  </div>
</div>
<script>
  // 1. 同步網址
  const scriptURL = 'https://script.google.com/macros/s/AKfycbx034LrpEloKIJ-dmJPdhC4qOlbe12amzFWEzSTgm6Ab1tn7TS_26TCFp6H3-PiP0BA/exec';

  // 2. 當按下「複製回饋」按鈕時，自動傳送一份到 Google Sheet
  document.getElementById('copy-report-btn').addEventListener('click', () => {
    const text = document.getElementById('report-text').value;
    if (!text) return;

    // --- 簡化版同步邏輯，不容易出錯 ---
    const formData = new FormData();
    formData.append('report', text); // 直接把回饋內容裝進包裹

    fetch(scriptURL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    }).catch(e => console.error('同步失敗', e));
</script>
